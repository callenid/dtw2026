<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Container (DIV)</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
			}
			.container {
				border: 2px dashed #777;
				padding: 16px;
				margin-bottom: 16px;
			}
			.box {
				border: 2px solid #333;
				padding: 10px;
				margin: 8px 0;
			}
		</style>
	</head>
	<body>
		<h1>CONTAINER (DIV)</h1>

		<div class="container">
			<h2>Ini container</h2>
			<div class="box">Item 1 di dalam container</div>
			<div class="box">Item 2 di dalam container</div>
		</div>

		<div class="box">Ini box di luar container</div>
	</body>
</html>
